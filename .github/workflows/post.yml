name: Post Fallout Quote

on:
  schedule:
    # 5 runs/dia em janelas US/global. Minutos randomizados pra fugir do :00 (assinatura de bot).
    - cron: '7 13 * * *'    # 09:07 ET / 10:07 BRT — manhã US, abrange Europa
    - cron: '23 15 * * *'   # 11:23 ET / 12:23 BRT — almoço US
    - cron: '41 19 * * *'   # 15:41 ET / 16:41 BRT — fim expediente US, prime BR
    - cron: '12 22 * * *'   # 18:12 ET / 19:12 BRT — prime US
    - cron: '38 0 * * *'    # 20:38 ET / 21:38 BRT — late US
  workflow_dispatch:        # permite rodar manualmente pelo painel do GitHub

jobs:
  post:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Random jitter (0-60s)
        run: sleep $((RANDOM % 61))   # afasta o post do horário do cron (minutos do cron já são randomizados)

      - name: Post quote
        env:
          X_API_KEY:            ${{ secrets.X_API_KEY }}
          X_API_SECRET:         ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN:       ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
        run: npm run bot

      - name: Commit updated state.json
        run: |
          git config user.name  "fallout-bot"
          git config user.email "bot@fallouteveryday"
          git add data/state.json
          git diff --staged --quiet && exit 0
          git commit -m "chore: mark quote as posted [skip ci]"
          # Retry com rebase para lidar com runs concorrentes
          for i in 1 2 3; do
            git pull --rebase origin main && git push && break
            echo "Push falhou (tentativa $i/3), aguardando..."
            sleep $((i * 3))
          done
