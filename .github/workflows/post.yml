name: Post Fallout Quote

on:
  schedule:
    # Overlap Brasil manhã + Europa almoço/tarde
    - cron: '0 11 * * *'   # 8h BRT / 6h EST / 12h CET
    - cron: '0 12 * * *'   # 9h BRT / 7h EST / 13h CET
    - cron: '0 13 * * *'   # 10h BRT / 8h EST / 14h CET
    - cron: '0 14 * * *'   # 11h BRT / 9h EST / 15h CET
    - cron: '0 15 * * *'   # 12h BRT / 10h EST / 16h CET
    - cron: '0 16 * * *'   # 13h BRT / 11h EST / 17h CET
    # US almoço + Brasil tarde + fim de tarde Europa
    - cron: '0 17 * * *'   # 14h BRT / 12h EST / 18h CET
    - cron: '0 18 * * *'   # 15h BRT / 13h EST / 19h CET
    - cron: '0 19 * * *'   # 16h BRT / 14h EST / 20h CET
    - cron: '0 20 * * *'   # 17h BRT / 15h EST / 21h CET
    # US tarde/noite + Brasil noite (prime time dos dois)
    - cron: '0 21 * * *'   # 18h BRT / 16h EST / 22h CET
    - cron: '0 22 * * *'   # 19h BRT / 17h EST / 23h CET
    - cron: '0 23 * * *'   # 20h BRT / 18h EST / 0h CET
    - cron: '0 0 * * *'    # 21h BRT / 19h EST
    - cron: '0 1 * * *'    # 22h BRT / 20h EST
  workflow_dispatch:        # permite rodar manualmente pelo painel do GitHub

jobs:
  post:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Random delay within window
        run: sleep $((RANDOM % 5))     # dorme 0–4 segundos antes de postar

      - name: Post quote
        env:
          X_API_KEY:            ${{ secrets.X_API_KEY }}
          X_API_SECRET:         ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN:       ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
        run: npm run bot

      - name: Commit updated state.json
        run: |
          git config user.name  "fallout-bot"
          git config user.email "bot@fallouteveryday"
          git add data/state.json
          git diff --staged --quiet && exit 0
          git commit -m "chore: mark quote as posted [skip ci]"
          # Retry com rebase para lidar com runs concorrentes
          for i in 1 2 3; do
            git pull --rebase origin main && git push && break
            echo "Push falhou (tentativa $i/3), aguardando..."
            sleep $((i * 3))
          done
