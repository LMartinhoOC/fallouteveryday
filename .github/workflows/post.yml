name: Post Fallout Quote

on:
  schedule:
    - cron: '0 10 * * *'   # ~7h BRT
    - cron: '0 13 * * *'   # ~10h BRT
    - cron: '0 18 * * *'   # ~15h BRT
    - cron: '0 23 * * *'   # ~20h BRT
  workflow_dispatch:        # permite rodar manualmente pelo painel do GitHub

jobs:
  post:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Random delay within window
        run: sleep $((RANDOM % 120))   # dorme 0–119 segundos antes de postar

      - name: Post quote
        env:
          X_API_KEY:            ${{ secrets.X_API_KEY }}
          X_API_SECRET:         ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN:       ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
        run: npm run bot

      - name: Commit updated state.json
        run: |
          git config user.name  "fallout-bot"
          git config user.email "bot@fallouteveryday"
          git add data/state.json
          git diff --staged --quiet || git commit -m "chore: mark quote as posted [skip ci]"
          git push
